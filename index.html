<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROW · KI-Büro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(160deg, #dfeaf6 0%, #eef1f6 55%, #f6eee2 100%);
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
canvas { display: block; }

#hud { position: fixed; top: 24px; left: 26px; color: #2c2f44; pointer-events: none; }
#hud h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.08em; }
#hud h1 span { color: #6b4fb5; }
#hud p  { font-size: 11px; color: #7d8298; margin-top: 4px; letter-spacing: 0.02em; }

#chat {
  position: fixed; top: 0; right: 0; height: 100%; width: 380px; max-width: 92vw;
  background: rgba(255,255,255,0.98); border-left: 1px solid rgba(120,110,170,0.18);
  box-shadow: -16px 0 50px rgba(60,50,110,0.16);
  display: flex; flex-direction: column;
  transform: translateX(105%); transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  z-index: 20;
}
#chat.open { transform: translateX(0); }
#chat-head { display: flex; align-items: center; gap: 12px; padding: 18px; border-bottom: 1px solid #eceaf4; }
#chat-avatar { width: 42px; height: 42px; border-radius: 50%; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; }
#chat-name { font-size: 16px; font-weight: 700; color: #23263a; }
#chat-role { font-size: 11px; color: #8a8ea4; }
#chat-close { margin-left: auto; background: none; border: none; font-size: 24px; color: #b3b6c6; cursor: pointer; line-height: 1; }
#chat-close:hover { color: #6b6e80; }
#chat-log { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 85%; padding: 9px 13px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
.msg.user { align-self: flex-end; background: #6b4fb5; color: #fff; border-bottom-right-radius: 5px; }
.msg.bot  { align-self: flex-start; background: #f1f0fa; color: #33364a; border-bottom-left-radius: 5px; }
#chat-empty { margin: auto; color: #a0a4b8; font-size: 13px; text-align: center; padding: 0 24px; line-height: 1.6; }
#chat-input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid #eceaf4; align-items: flex-end; }
#chat-text { flex: 1; resize: none; border: 1px solid #dcdbe8; border-radius: 12px; padding: 10px 12px; font: inherit; font-size: 13.5px; max-height: 120px; outline: none; }
#chat-text:focus { border-color: #6b4fb5; }
#chat-send { flex: 0 0 auto; width: 40px; height: 40px; border: none; border-radius: 11px; background: #6b4fb5; color: #fff; font-size: 16px; cursor: pointer; }
#chat-send:disabled { opacity: 0.5; cursor: default; }
#chat-handoff { margin: 0 14px 14px; padding: 11px; border: none; border-radius: 12px; background: #1D9E75; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
#chat-handoff:hover { filter: brightness(1.05); }

#toast {
  position: fixed; top: 24px; right: 24px; background: #1D9E75; color: #fff;
  border-radius: 11px; padding: 11px 18px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: opacity 0.25s; pointer-events: none;
  box-shadow: 0 8px 24px rgba(29,158,117,0.3);
}
#toast.show { opacity: 1; }

#hint {
  position: fixed; bottom: 22px; right: 24px; font-size: 11px;
  color: #9499ad; pointer-events: none;
}

#bgm-btn {
  position: fixed; bottom: 22px; left: 26px;
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(120,110,170,0.18); background: rgba(255,255,255,0.92);
  font-size: 16px; cursor: pointer; line-height: 1;
  box-shadow: 0 4px 14px rgba(60,50,110,0.12); transition: filter 0.15s;
}
#bgm-btn:hover { filter: brightness(1.05); }
#bgm-btn.muted { opacity: 0.55; }
</style>
</head>
<body>

<div id="hud">
  <h1>GROW <span>·</span> KI-Büro</h1>
  <p>Klick auf einen Mitarbeiter</p>
</div>

<div id="chat">
  <div id="chat-head">
    <div id="chat-avatar"></div>
    <div>
      <div id="chat-name"></div>
      <div id="chat-role"></div>
    </div>
    <button id="chat-close" onclick="closeChat()">×</button>
  </div>
  <div id="chat-log"></div>
  <div id="chat-input-row">
    <textarea id="chat-text" rows="1" placeholder="Schreib eine Nachricht..."></textarea>
    <button id="chat-send" onclick="sendChat()">➤</button>
  </div>
  <button id="chat-handoff" onclick="handoff()">In Claude Code übernehmen ↗</button>
</div>

<div id="toast"></div>
<div id="hint">Ziehen zum Drehen · Scrollen zum Zoomen</div>

<audio id="bgm" src="office-theme.mp3" loop preload="auto"></audio>
<button id="bgm-btn" title="Musik an/aus">🔊</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
// SCENE + RENDERER (heller Iso-Look)
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf6f8fb);

let W = window.innerWidth, H = window.innerHeight;
const D = 14.6;                    // Iso-Frustum-Halbgroesse
let aspect = W / H;
const camera = new THREE.OrthographicCamera(-D*aspect, D*aspect, D, -D, -100, 200);
camera.zoom = 1;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

// ─────────────────────────────────────────────
// LIGHTS (warm, hell, weiche Schatten)
// ─────────────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xeaf1fb, 0xd8c6a0, 0.34));
scene.add(new THREE.AmbientLight(0xffffff, 0.05));

const sun = new THREE.DirectionalLight(0xfff3df, 0.92);
sun.position.set(26, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(2048);
sun.shadow.bias = -0.0004;
Object.assign(sun.shadow.camera, { left:-34, right:34, top:34, bottom:-34, near:1, far:120 });
scene.add(sun);

const fill = new THREE.DirectionalLight(0xbcd4ff, 0.4);
fill.position.set(-18, 14, -10);
scene.add(fill);

// ─────────────────────────────────────────────
// ISO-ORBIT (Drehen + Zoomen)
// ─────────────────────────────────────────────
let isDragging = false, moved = false, lastX = 0, lastY = 0;
let theta = Math.PI * 0.25, phi = 0.96;            // Start: klassischer Iso-Winkel
let tTheta = theta, tPhi = phi, tZoom = 1;
const camDist = 80;

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; moved = false; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  moved = true;
  tTheta -= (e.clientX - lastX) * 0.006;
  tPhi   -= (e.clientY - lastY) * 0.004;
  tPhi = Math.max(0.45, Math.min(1.35, tPhi));
  lastX = e.clientX; lastY = e.clientY;
});
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  tZoom = Math.max(0.55, Math.min(2.4, tZoom - e.deltaY * 0.0016));
}, { passive: false });

const CENTER = new THREE.Vector3(0.5, 0.6, -1.5);
function updateCamera() {
  theta += (tTheta - theta) * 0.1;
  phi   += (tPhi   - phi)   * 0.1;
  camera.zoom += (tZoom - camera.zoom) * 0.1;
  camera.position.set(
    CENTER.x + camDist * Math.sin(phi) * Math.sin(theta),
    CENTER.y + camDist * Math.cos(phi),
    CENTER.z + camDist * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(CENTER);
  camera.updateProjectionMatrix();
}

// ─────────────────────────────────────────────
// GEOMETRIE-HELFER  (alles in "root" = kompakt skalierbares Office)
// ─────────────────────────────────────────────
const root = new THREE.Group();
root.scale.setScalar(0.6);
scene.add(root);

const mat = (c, opt={}) => new THREE.MeshLambertMaterial(Object.assign({ color: c }, opt));
function box(w, h, d, c, x=0, y=0, z=0, ry=0, parent=root, opt={}) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(c, opt));
  m.position.set(x, y, z); m.rotation.y = ry;
  m.castShadow = true; m.receiveShadow = true;
  parent.add(m); return m;
}
function cyl(rt, rb, h, c, x, y, z, segs=10, parent=root) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, segs), mat(c));
  m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
  parent.add(m); return m;
}
function screen(c) { return mat(c, { emissive: c, emissiveIntensity: 0.55 }); }

// ─────────────────────────────────────────────
// BODEN (L-foermiger Cutaway-Grundriss, drei Felder, weisser Void drumherum)
// ─────────────────────────────────────────────
const FLOOR = 0xefdcba;
function slab(cx, cz, w, d) {
  const m = box(w, 0.3, d, FLOOR, cx, -0.15, cz);   // duenne Bodenplatte
  m.castShadow = false; return m;
}
slab(-9.25, -14, 21.5, 16);   // A oben-links (Video + Social)  x[-20,1.5] z[-22,-6]
slab(11.75, -12, 20.5, 12);   // B oben-rechts (Design)         x[1.5,22]  z[-18,-6]
slab(1, 5.5, 42, 23);         // C vorderer Trakt               x[-20,22]  z[-6,17]

// ─────────────────────────────────────────────
// WAENDE (raumweise Rueck-/Seitenflaechen, Cutaway)
// ─────────────────────────────────────────────
const WALL = 0xeef0f4, WALL_BLUE = 0xcfe1ec, BASE = 0xdadfe8;
const wallH = 8.2;
function wall(cx, cz, w, d, h=wallH, c=WALL) { box(w, h, d, c, cx, h/2, cz); }

wall(-9.25, -21.85, 21.5, 0.4);          // A Rueckwand
wall(-19.85, -14, 0.4, 16);              // A linke Wand
wall(11.75, -17.85, 20.5, 0.4);          // B Rueckwand
wall(21.85, -12, 0.4, 12);               // B rechte Wand (Bilderwand)
wall(1.5, -14, 0.4, 16, 6.0);            // Trennwand A|B (mit Pinnwand)
wall(-19.85, 1.5, 0.4, 15, wallH, WALL_BLUE); // linke Wand vorderer Trakt (Editing-Bay)
wall(-0.5, -5.85, 11, 0.4, 5.4);         // Wand hinter Buchhaltungs-Desk (Whiteboard+Kalender)
// Sockelleisten
box(21.5,0.4,0.4,BASE,-9.25,0.2,-21.7); box(0.4,0.4,16,BASE,-19.7,0.2,-14);
box(20.5,0.4,0.4,BASE,11.75,0.2,-17.7); box(0.4,0.4,15,BASE,-19.7,0.2,1.5);

// Fenster
function windowOnWall(x, z, ry, w=4.2) {
  box(w, 3.4, 0.16, 0xc7cedb, x, 5.0, z, ry);
  box(w-0.5, 2.8, 0.08, 0x9fd2ef, x, 5.0, z, ry, root, { transparent:true, opacity:0.5 }).castShadow = false;
}
windowOnWall(-13, -21.72, 0); windowOnWall(-5, -21.72, 0);      // A hinten
windowOnWall(-19.72, -16.5, Math.PI/2);                        // A links
windowOnWall(8.5, -17.72, 0); windowOnWall(15.5, -17.72, 0);   // B hinten

// ─────────────────────────────────────────────
// MOEBEL-BAUSTEINE
// ─────────────────────────────────────────────
const WOOD = 0xe0a766, WOOD_D = 0xbc8442, CHAIR = 0x322d47, CHAIR_A = 0x4a4368;

// Schreibtisch (Holz, helle Platte) mit optionaler Akzentkante
function desk(x, z, ry=0, accent=null) {
  const g = new THREE.Group(); g.position.set(x, 0, z); g.rotation.y = ry; root.add(g);
  box(4.0, 0.18, 2.1, WOOD, 0, 1.5, 0, 0, g);
  box(4.0, 0.12, 2.1, WOOD_D, 0, 1.4, 0, 0, g);          // Kante/Unterseite dunkler
  if (accent) box(4.0, 0.1, 0.12, accent, 0, 1.5, 1.05, 0, g);
  [[-1.8,-0.9],[1.8,-0.9],[-1.8,0.9],[1.8,0.9]].forEach(([lx,lz]) =>
    box(0.16, 1.42, 0.16, WOOD_D, lx, 0.72, lz, 0, g));
  return g;
}

// Buerostuhl
function chair(x, z, ry=0, color=CHAIR) {
  const g = new THREE.Group(); g.position.set(x, 0, z); g.rotation.y = ry; root.add(g);
  box(1.15, 0.2, 1.1, color, 0, 1.02, 0, 0, g);
  box(1.18, 1.25, 0.18, color, 0, 1.72, -0.47, 0, g);
  box(1.18, 0.22, 0.5, color, -0.0, 1.18, -0.2, 0, g);   // Lehnen-Ansatz
  cyl(0.09, 0.09, 1.0, 0x2a2533, 0, 0.5, 0, 8, g);
  [[-0.45,0.45],[0.45,0.45],[-0.45,-0.45],[0.45,-0.45],[0,-0.55]].forEach(([wx,wz]) =>
    cyl(0.1, 0.1, 0.16, 0x201d2a, wx, 0.1, wz, 6, g));
  return g;
}

// Monitor mit optionalem Bildschirm-Inhalt: 'edit' | 'code' | 'design' | Farbe
function monitor(x, y, z, parent, scr=0x2f7fd6, w=1.7, h=1.05) {
  box(w, h, 0.08, 0x202430, x, y, z, 0, parent);
  box(0.1, 0.34, 0.1, 0x2a2d36, x, y-0.64, z, 0, parent);
  box(0.62, 0.06, 0.34, 0x2a2d36, x, y-0.82, z, 0, parent);
  const fz = z + 0.05;
  if (scr === 'edit') {
    box(w-0.12, h-0.12, 0.03, 0x12151d, x, y, fz, 0, parent).material = screen(0x12151d);
    box(w-0.4, (h-0.2)*0.5, 0.02, 0x1d2740, x, y+0.18, fz+0.01, 0, parent).material = screen(0x24405f); // Vorschau
    [0xf25c54,0x4f9bff,0x37c98a,0xffc857].forEach((c,i)=> // Timeline-Spuren
      box(w-0.3, 0.08, 0.02, c, x, y-0.16-i*0.11, fz+0.01, 0, parent).material = screen(c));
    const tri = new THREE.Mesh(new THREE.ConeGeometry(0.12,0.2,3), screen(0xff5a52));
    tri.position.set(x, y+0.18, fz+0.03); tri.rotation.z = -Math.PI/2; parent.add(tri);
  } else if (scr === 'code') {
    box(w-0.12, h-0.12, 0.03, 0x10141d, x, y, fz, 0, parent).material = screen(0x10141d);
    for (let i=0;i<5;i++) box((0.4+((i*7)%5)/6*0.9), 0.07, 0.02,[0x6cc6ff,0x37c98a,0xc792ea,0xffd479,0x8a8fa3][i%5], x-0.35+((i%2)*0.18), y+0.36-i*0.16, fz+0.01, 0, parent).material = screen([0x6cc6ff,0x37c98a,0xc792ea,0xffd479,0x8a8fa3][i%5]);
  } else if (scr === 'design') {
    box(w-0.12, h-0.12, 0.03, 0xf3f1ee, x, y, fz, 0, parent).material = screen(0xf3f1ee);
    [[0xff6b6b,-0.3,0.15],[0x4fc3f7,0.25,0.2],[0xffd54f,0.0,-0.2],[0x9ccc65,-0.25,-0.18]].forEach(([c,sx,sy])=>
      box(0.42,0.34,0.02,c,x+sx,y+sy,fz+0.01,0,parent).material = screen(c));
  } else {
    box(w-0.12, h-0.12, 0.04, scr, x, y, fz, 0, parent).material = screen(scr);
  }
}
function keyboardMouse(x, z, parent) {
  box(0.95, 0.06, 0.36, 0x2b2e38, x, 1.62, z+0.55, 0, parent);
  box(0.22, 0.06, 0.34, 0x2b2e38, x+0.75, 1.62, z+0.55, 0, parent);
}
function laptop(x, z, parent, scr=0x46c0a0) {
  box(0.96, 0.05, 0.66, 0xb9bfca, x, 1.62, z, 0, parent);
  box(0.96, 0.62, 0.05, 0xb9bfca, x, 1.93, z-0.31, 0, parent);
  box(0.86, 0.52, 0.03, 0x000, x, 1.95, z-0.28, 0, parent).material = screen(scr);
}
function plant(x, z, s=1) {
  const g = new THREE.Group(); g.position.set(x,0,z); g.scale.setScalar(s); root.add(g);
  cyl(0.3, 0.38, 0.6, 0xe6e9ef, 0, 0.3, 0, 8, g);
  cyl(0.31, 0.31, 0.12, 0xcaa06a, 0, 0.58, 0, 8, g);
  [[0,1.0,0.5,0x4f9e3f],[0.2,1.28,0.38,0x5cb348],[-0.18,1.22,0.4,0x6ec257],[0,1.45,0.3,0x57ad45]].forEach(([px,py,r,c])=>{
    const m = new THREE.Mesh(new THREE.IcosahedronGeometry(r, 0), mat(c));
    m.position.set(px,py,0); m.castShadow=true; g.add(m);
  });
  return g;
}
// Wandbild: Rahmen + Motiv ('yt' = YouTube-Play, 'tri' = buntes Dreieck, sonst Farbe)
function frame(x, y, z, ry, motif, w=2.0, h=1.5) {
  box(w, h, 0.14, 0xffffff, x, y, z, ry);
  const fz = z + (ry ? 0 : 0.07), fx = x + (ry ? (ry>0?-0.07:0.07) : 0);
  if (motif === 'yt') {
    box(w-0.24, h-0.24, 0.04, 0xe23b3b, fx, y, fz, ry).material = screen(0xe23b3b);
    const tri = new THREE.Mesh(new THREE.ConeGeometry(0.26,0.4,3), mat(0xffffff));
    tri.position.set(fx + (ry?0.04:0), y, fz + (ry?0:0.04));
    tri.rotation.z = -Math.PI/2; if (ry) tri.rotation.y = ry; parent_addSafe(tri);
  } else if (motif === 'tri') {
    box(w-0.24, h-0.24, 0.04, 0xf1f3f7, fx, y, fz, ry);
    [[0x4fc3f7,-0.3,0.2],[0xff7043,0.28,0.1],[0xffd54f,0.0,-0.25],[0x9ccc65,0.3,-0.2],[0xab47bc,-0.28,-0.15]].forEach(([c,sx,sy])=>{
      const t = new THREE.Mesh(new THREE.ConeGeometry(0.22,0.34,3), screen(c));
      t.position.set(fx + (ry?0.03:sx), y+sy, fz + (ry?sx:0.03)); t.rotation.z = (sx+sy); if(ry) t.rotation.y=ry; parent_addSafe(t);
    });
  } else {
    box(w-0.24, h-0.24, 0.04, motif, fx, y, fz, ry).material = screen(motif);
  }
}
function parent_addSafe(m){ m.castShadow=false; root.add(m); }

// Ringlicht mit Stativ + Handy
function ringLight(x, z, s=1) {
  const g = new THREE.Group(); g.position.set(x,0,z); g.scale.setScalar(s); root.add(g);
  cyl(0.08,0.1,0.06,0x2b2b33,0,0.05,0,6,g);
  [-0.6,0.6].forEach(a=>cyl(0.05,0.05,2.9,0x3a3a44,Math.sin(a)*0.4,1.45,Math.cos(a)*0.4-0.2,6,g));
  cyl(0.07,0.07,2.9,0x3a3a44,0,1.45,0.25,6,g);
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.95,0.13,8,22), mat(0xfff3c4,{emissive:0xfff0b0,emissiveIntensity:0.85}));
  ring.position.set(0,3.0,0); g.add(ring);
  box(0.55,0.95,0.07,0x15171d,0,3.0,0.16,0,g).material = screen(0x2a2f3a); // Handy
  return g;
}
// Buecherstapel
function books(x, y, z, parent) {
  [0x4f7fd6,0x57ad45,0xe0533a,0xf2b134].forEach((c,i)=>
    box(0.32, 0.16, 1.0 - i*0.06, c, x, y+0.09+i*0.17, z, (i%2)*0.12, parent));
}
// Desk-Lampe
function deskLamp(x, z, parent) {
  cyl(0.18,0.22,0.06,0x4f9bd6,x,1.56,z,8,parent);
  cyl(0.04,0.04,0.5,0x6cb0e0,x,1.8,z,6,parent);
  const sh = new THREE.Mesh(new THREE.ConeGeometry(0.28,0.3,10,1,true), mat(0x4f9bd6));
  sh.position.set(x,2.1,z); parent.add(sh);
}

// ═════════════ RAUM A (oben-links): Video + Social ═════════════
// TIMO Video-Schnitt-Desk (Ecke links)
const timoDesk = desk(-15.5, -16, 0, 0x0F6E56);
monitor(-0.95, 2.55, -0.7, timoDesk, 'edit', 1.8, 1.1);
monitor(0.95, 2.55, -0.7, timoDesk, 'edit', 1.8, 1.1);
keyboardMouse(0, -0.05, timoDesk);
box(1.2, 0.06, 0.85, 0x2a2d36, -1.45, 1.6, 0.45, 0, timoDesk);   // Grafiktablett
cyl(0.07,0.08,0.4,0x3a3a4e,1.6,1.72,0.55,6,timoDesk);            // Stiftehalter
const timoChair = chair(-15.5, -13, Math.PI, CHAIR);
// Social-Setup (Mitte Raum A)
const socialDesk = desk(-6, -16, 0, 0xefb14d);

function buildLeg(side, pants) {
  const hip = new THREE.Group(); hip.position.set(0.15*side, 0.92, 0);
  box(0.21, 0.44, 0.21, pants, 0, -0.22, 0, 0, hip);
  const knee = new THREE.Group(); knee.position.y = -0.44; hip.add(knee);
  box(0.19, 0.42, 0.19, pants, 0, -0.21, 0, 0, knee);
  box(0.23, 0.13, 0.34, 0x2a2333, 0, -0.42, 0.07, 0, knee);   // Schuh
  return { hip, knee };
}
function buildArm(side, sleeve, skin) {
  const sh = new THREE.Group(); sh.position.set(0.33*side, 1.52, 0);
  box(0.17, 0.5, 0.17, sleeve, 0, -0.26, 0, 0, sh);
  box(0.16, 0.18, 0.15, skin, 0, -0.56, 0, 0, sh);           // Hand
  return sh;
}

function buildChar(cfg) {
  const g = new THREE.Group(); g.position.set(cfg.x, 0, cfg.z); g.scale.setScalar(1.3); root.add(g);
  const { skin, top, hair, pants } = cfg.look;

  box(0.52, 0.66, 0.32, top, 0, 1.32, 0, 0, g);               // Oberkoerper
  box(0.4, 0.16, 0.34, 0xf4f5f8, 0, 1.66, 0.02, 0, g);        // Kragen / heller Ausschnitt
  const head = box(0.37, 0.38, 0.35, skin, 0, 1.86, 0, 0, g); // Kopf
  box(0.07,0.07,0.04,0x2a2333, -0.1, 1.88, 0.18, 0, g);       // Augen
  box(0.07,0.07,0.04,0x2a2333,  0.1, 1.88, 0.18, 0, g);
  // Haare
  box(0.4, 0.16, 0.38, hair, 0, 2.07, 0, 0, g);
  if (cfg.look.longHair) { box(0.42,0.34,0.18,hair,0,1.92,-0.16,0,g); }
  else { box(0.42,0.1,0.4,hair,0,1.99,0.02,0,g); }            // kurzer Pony
  if (cfg.look.beard) box(0.3,0.12,0.06,cfg.look.beard,0,1.71,0.17,0,g);
  if (cfg.look.headphones) {                                  // Kopfhoerer (Timo)
    box(0.46,0.1,0.12,0x23262f,0,2.12,0,0,g);
    box(0.12,0.22,0.2,0x23262f,-0.24,1.9,0,0,g);
    box(0.12,0.22,0.2,0x23262f, 0.24,1.9,0,0,g);
  }

  const legL = buildLeg(-1, pants), legR = buildLeg(1, pants);
  const armL = buildArm(-1, top, skin), armR = buildArm(1, top, skin);
  g.add(legL.hip, legR.hip, armL, armR);

  // Namensschild
  const cv = document.createElement('canvas'); cv.width = 320; cv.height = 96;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  const rr=18,w2=320,h2=96; ctx.beginPath();
  ctx.moveTo(rr,0); ctx.arcTo(w2,0,w2,h2,rr); ctx.arcTo(w2,h2,0,h2,rr);
  ctx.arcTo(0,h2,0,0,rr); ctx.arcTo(0,0,w2,0,rr); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#23263a'; ctx.font = 'bold 34px system-ui'; ctx.textAlign='center';
  ctx.fillText(cfg.name, 160, 42);
  ctx.fillStyle = '#8a5cf0'; ctx.font = '22px system-ui';
  ctx.fillText(cfg.role, 160, 74);
  const label = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 0.72),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent:true, depthTest:false }));
  label.position.y = 2.62; label.renderOrder = 10; label.userData.isLabel = true; g.add(label);

  return {
    group: g, cfg, legL, legR, armL, armR, label,
    state: 'walk', ti: 0, timer: 0, sway: Math.random()*6.28,
    speed: 3.0 + Math.random()*0.6,
  };
}

const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
let activeChar = null;

renderer.domElement.addEventListener('click', e => {
  if (moved) return;
  mouse.x =  (e.clientX / W) * 2 - 1;
  mouse.y = -(e.clientY / H) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  chars.forEach(c => c.group.traverse(o => { if (o.isMesh && !o.userData.isLabel) meshes.push(o); }));
  const hits = raycaster.intersectObjects(meshes);
  if (!hits.length) return;
  const hit = hits[0].object;
  for (const c of chars) {
    let found = false; c.group.traverse(o => { if (o === hit) found = true; });
    if (found) { openChat(c); break; }
  }
});

// ── In-App-Chat (Verlauf im Browser, Handoff nach Claude Code) ──
let chatAgent = null;
const histKey = a => 'ki-chat-' + a;
const loadHist = a => { try { return JSON.parse(localStorage.getItem(histKey(a)) || '[]'); } catch { return []; } };
const saveHist = (a, h) => { try { localStorage.setItem(histKey(a), JSON.stringify(h)); } catch (e) {} };

function openChat(c) {
  activeChar = c;
  chatAgent = c.cfg.cmd.slice(1);               // 'emilia' | 'timo'
  const hex = '#' + c.cfg.color.toString(16).padStart(6,'0');
  const av = document.getElementById('chat-avatar');
  av.style.background = hex; av.textContent = c.cfg.initials;
  document.getElementById('chat-name').textContent = c.cfg.name;
  document.getElementById('chat-role').textContent = c.cfg.role;
  document.getElementById('chat-send').style.background = hex;
  renderLog();
  document.getElementById('chat').classList.add('open');
  document.getElementById('chat-text').focus();
}
window.closeChat = () => document.getElementById('chat').classList.remove('open');

function renderLog() {
  const log = document.getElementById('chat-log');
  const hist = loadHist(chatAgent);
  log.innerHTML = '';
  if (!hist.length) {
    const greet = chatAgent === 'emilia'
      ? 'Hi, ich bin Emilia. Frag mich zu Social Media, Titeln, Captions oder briefe ein Video.'
      : 'Servus, Timo hier. Frag mich zum Schnitt, zu Kunden-Schnittregeln oder briefe einen Cut.';
    const d = document.createElement('div'); d.id = 'chat-empty'; d.textContent = greet;
    log.appendChild(d); return;
  }
  const hex = '#' + activeChar.cfg.color.toString(16).padStart(6,'0');
  hist.forEach(m => {
    const d = document.createElement('div');
    d.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');
    if (m.role === 'user') d.style.background = hex;
    d.textContent = m.content;
    log.appendChild(d);
  });
  log.scrollTop = log.scrollHeight;
}

window.sendChat = async () => {
  const ta = document.getElementById('chat-text');
  const text = ta.value.trim();
  if (!text || !chatAgent) return;
  const send = document.getElementById('chat-send');
  const hist = loadHist(chatAgent);
  hist.push({ role: 'user', content: text });
  saveHist(chatAgent, hist); ta.value = ''; renderLog();
  send.disabled = true;
  const log = document.getElementById('chat-log');
  const typing = document.createElement('div'); typing.className = 'msg bot'; typing.textContent = '…';
  log.appendChild(typing); log.scrollTop = log.scrollHeight;
  try {
    const r = await fetch('/.netlify/functions/chat', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ agent: chatAgent, messages: hist.map(m => ({ role: m.role, content: m.content })) }),
    });
    const data = await r.json();
    const h2 = loadHist(chatAgent);
    if (r.ok && data.text) h2.push({ role: 'assistant', content: data.text });
    else h2.push({ role: 'assistant', content: '(Noch keine Antwort: ' + (data.error || 'unbekannt') + ')\nDer In-App-Chat antwortet erst nach dem Netlify-Deploy mit gesetztem API-Key. Nutze solange den Button unten.' });
    saveHist(chatAgent, h2); renderLog();
  } catch (e) {
    const h2 = loadHist(chatAgent);
    h2.push({ role: 'assistant', content: '(Keine Verbindung zum Chat-Server. Im lokalen Preview läuft die Netlify-Funktion nicht: bitte deployen oder den Button unten nutzen.)' });
    saveHist(chatAgent, h2); renderLog();
  } finally { send.disabled = false; }
};

window.handoff = () => {
  if (!activeChar) return;
  const hist = loadHist(chatAgent);
  let payload = activeChar.cfg.cmd;
  if (hist.length) {
    payload += '\n\nBisheriger Chat-Verlauf aus dem KI-Büro (bitte hier weiterführen):\n';
    payload += hist.map(m => (m.role === 'user' ? 'Ich: ' : activeChar.cfg.name + ': ') + m.content).join('\n');
  }
  navigator.clipboard.writeText(payload).catch(() => {});
  const t = document.getElementById('toast');
  t.textContent = activeChar.cfg.cmd + ' + Verlauf kopiert: in Claude Code einfügen';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
  window.open('https://claude.ai/code', '_blank');
};

document.getElementById('chat-text').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendChat(); }
});

// BEWEGUNG: laufen zwischen Stationen, am Desk hinsetzen
// ─────────────────────────────────────────────
function setPose(c, mode, t) {
  const { legL, legR, armL, armR } = c;
  if (mode === 'sit') {
    legL.hip.rotation.x = -1.45; legR.hip.rotation.x = -1.45;
    legL.knee.rotation.x = 1.5;  legR.knee.rotation.x = 1.5;
    armL.rotation.x = -0.7; armR.rotation.x = -0.7;
  } else if (mode === 'walk') {
    const s = Math.sin(t * 9);
    legL.hip.rotation.x =  s * 0.5; legR.hip.rotation.x = -s * 0.5;
    legL.knee.rotation.x = Math.max(0, -s)*0.5; legR.knee.rotation.x = Math.max(0, s)*0.5;
    armL.rotation.x = -s * 0.4; armR.rotation.x = s * 0.4;
  } else { // idle
    legL.hip.rotation.x = 0; legR.hip.rotation.x = 0;
    legL.knee.rotation.x = 0; legR.knee.rotation.x = 0;
    armL.rotation.x = Math.sin(t*2)*0.05; armR.rotation.x = Math.sin(t*2+1)*0.05;
  }
}

const clock = new THREE.Clock();
const _v = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta ? 0.016 : 0.016, 0.05);

  chars.forEach(c => {
    const route = c.cfg.route, target = route[c.ti];
    const g = c.group;

    if (c.state === 'walk') {
      _v.set(target.x - g.position.x, 0, target.z - g.position.z);
      const dist = _v.length();
      if (dist > 0.08) {
        _v.normalize();
        g.position.x += _v.x * c.speed * dt;
        g.position.z += _v.z * c.speed * dt;
        g.rotation.y = Math.atan2(_v.x, _v.z);
        g.position.y = Math.abs(Math.sin(t*9)) * 0.05;
        setPose(c, 'walk', t);
      } else {
        g.position.set(target.x, 0, target.z);
        if (target.sit) {
          c.state = 'sit'; c.timer = 6 + Math.random()*5;
          if (target.face !== undefined) g.rotation.y = target.face;
          setPose(c, 'sit', t);
        } else {
          c.state = 'idle'; c.timer = 1.2 + Math.random()*2.5;
        }
      }
    } else { // sit oder idle
      c.timer -= dt;
      setPose(c, c.state === 'sit' ? 'sit' : 'idle', t);
      if (c.state === 'sit') g.position.y = 0;
      else g.position.y = Math.sin(t*2 + c.sway)*0.012;
      if (c.timer <= 0) { c.ti = (c.ti + 1) % route.length; c.state = 'walk'; }
    }

    c.label.quaternion.copy(camera.quaternion);   // Schild immer zur Kamera
  });

  updateCamera();
  renderer.render(scene, camera);
}
animate();

bgmBtn.addEventListener('click', e => {
  e.stopPropagation();
  bgmMuted = !bgmMuted;
  if (bgmMuted) { bgm.pause(); bgmBtn.textContent = '🔇'; bgmBtn.classList.add('muted'); }
  else { bgm.play().catch(() => {}); bgmBtn.textContent = '🔊'; bgmBtn.classList.remove('muted'); }
});
</script>
</body>
</html>
